<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shortcuts</title>

<style>
body {
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    margin-bottom: 30px;
}

details {
    background: #1b1b1b;
    border-radius: 10px;
    margin-bottom: 15px;
    overflow: hidden;
}

summary {
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    list-style: none;
}

summary::-webkit-details-marker {
    display: none;
}

summary::before {
    content: "▶";
    margin-right: 10px;
    display: inline-block;
    transition: transform .2s;
}

details[open] summary::before {
    transform: rotate(90deg);
}

.links {
    padding: 0 15px 15px;
}

a {
    display: block;
    background: #242424;
    color: #4da3ff;
    text-decoration: none;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    transition: background .2s;
}

a:hover {
    background: #333;
}
</style>
</head>

<body>

<h1>Shortcuts</h1>

<details open>
    <summary>Email</summary>
    <div class="links">
        <a href="https://mail.proton.me/u/4/inbox">Proton Mail</a>
        <a href="https://calendar.proton.me/u/4/">Proton Calendar</a>
        <a href="https://login.microsoftonline.com/common/oauth2/v2.0/authorize?...">Outlook</a>
    </div>
</details>

<details>
    <summary>Files</summary>
    <div class="links">
        <a href="https://drive.proton.me/u/4/...">Proton Drive</a>
        <a href="https://onedrive.live.com/login">OneDrive</a>
        <a href="https://os5.mycloud.com/cloud/shares">WD MyCloud</a>
    </div>
</details>

<details>
    <summary>News & Weather</summary>
    <div class="links">
        <a href="https://news.bbc.co.uk">BBC News</a>
        <a href="https://www.bbc.co.uk/weather">BBC Weather</a>
    </div>
</details>

<details>
    <summary>Shopping</summary>
    <div class="links">
        <a href="https://www.amazon.co.uk">Amazon</a>
        <a href="https://www.ebay.co.uk/">eBay</a>
        <a href="https://uk.webuy.com/">CeX</a>
    </div>
</details>

<details>
    <summary>Gaming</summary>
    <div class="links">
        <a href="https://steamcommunity.com/login">Steam</a>
    </div>
</details>

<details>
    <summary>Social</summary>
    <div class="links">
        <a href="https://www.instagram.com/">Instagram</a>
    </div>
</details>

<details>
    <summary>Development</summary>
    <div class="links">
        <a href="https://github.com/login">GitHub</a>
        <a href="https://chatgpt.com/">ChatGPT</a>
    </div>
</details>

<details>
    <summary>Utilities</summary>
    <div class="links">
        <a href="https://www.google.co.uk/maps">Google Maps</a>
        <a href="https://booksy.com/en-gb">Booksy</a>
    </div>
</details>

</body>
</html>
